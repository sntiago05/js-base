<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="main.js" defer></script>
    <title>Document</title>
  </head>
  <body>
    <div id="galeria">
      <div class="imagen-principal">
        <img id="imagen-grande" src="imgs/1.png" alt="Imagen principal" />
      </div>

      <div class="miniaturas">
        <img
          src="imgs/1.png"
          alt="Imagen 1"
          class="miniatura activa"
          data-src="imgs/1.png"
        />
        <img
          src="imgs/2.png"
          alt="Imagen 2"
          class="miniatura"
          data-src="imgs/2.png"
        />
        <img
          src="imgs/3.png"
          alt="Imagen 3"
          class="miniatura"
          data-src="imgs/3.png"
        />
        <img
          src="imgs/4.png"
          alt="Imagen 4"
          class="miniatura"
          data-src="imgs/4.png"
        />
      </div>

      <div class="controles">
        <button id="anterior">← Anterior</button>
        <button id="siguiente">Siguiente →</button>
      </div>
    </div>
  </body>
</html>
